<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Fish body -->
  <ellipse cx="240" cy="260" rx="110" ry="60" fill="white" opacity="0.95"/>
  <!-- Tail fin -->
  <polygon points="350,260 400,210 400,310" fill="white" opacity="0.95"/>
  <!-- Tail fin connection -->
  <ellipse cx="345" cy="260" rx="20" ry="40" fill="white" opacity="0.95"/>
  <!-- Eye -->
  <circle cx="175" cy="245" r="14" fill="#0f766e"/>
  <circle cx="178" cy="242" r="5" fill="white"/>
  <!-- Dorsal fin -->
  <path d="M210,200 Q240,155 280,200" fill="white" opacity="0.85"/>
  <!-- Pectoral fin -->
  <path d="M220,275 Q235,310 265,290" fill="white" opacity="0.8" stroke="rgba(15,118,110,0.15)" stroke-width="1"/>
  <!-- Gill line -->
  <path d="M200,230 Q195,260 200,285" fill="none" stroke="rgba(15,118,110,0.25)" stroke-width="3" stroke-linecap="round"/>
  <!-- Scale hints -->
  <path d="M230,240 Q245,235 255,245" fill="none" stroke="rgba(15,118,110,0.1)" stroke-width="2"/>
  <path d="M255,240 Q270,235 280,245" fill="none" stroke="rgba(15,118,110,0.1)" stroke-width="2"/>
  <path d="M240,260 Q255,255 265,265" fill="none" stroke="rgba(15,118,110,0.1)" stroke-width="2"/>
  <path d="M265,258 Q280,253 290,263" fill="none" stroke="rgba(15,118,110,0.1)" stroke-width="2"/>
</svg>
